<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="90" cy="90" r="90" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1a237e" />
      <stop offset="1" stop-color="#0a1a2f" />
    </radialGradient>
    <radialGradient id="glow" cx="90" cy="90" r="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffe066" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#1989fa" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arc1" x1="30" y1="150" x2="90" y2="90" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffe066" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#1989fa" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="arc2" x1="150" y1="150" x2="90" y2="90" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#1989fa" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="arc3" x1="30" y1="30" x2="90" y2="90" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1989fa" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#ffe066" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <circle cx="90" cy="90" r="88" fill="url(#bg)" stroke="#1989fa" stroke-width="4"/>
  <!-- 星云光晕 -->
  <ellipse cx="90" cy="90" rx="38" ry="18" fill="url(#glow)" opacity="0.8"/>
  <!-- 多条星屑汇聚轨迹 -->
  <path d="M30 150 Q70 120 90 90" stroke="url(#arc1)" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M150 150 Q110 120 90 90" stroke="url(#arc2)" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M30 30 Q70 60 90 90" stroke="url(#arc3)" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- 星屑点（分布在轨迹上和外围） -->
  <g>
    <!-- 主轨迹星屑 -->
    <circle cx="30" cy="150" r="2.5" fill="#ffe066" opacity="0.8"/>
    <circle cx="40" cy="140" r="2" fill="#fff" opacity="0.7"/>
    <circle cx="50" cy="130" r="1.7" fill="#1989fa" opacity="0.8"/>
    <circle cx="60" cy="120" r="2.2" fill="#fff" opacity="0.8"/>
    <circle cx="70" cy="110" r="2.5" fill="#ffe066" opacity="0.9"/>
    <circle cx="150" cy="150" r="2.3" fill="#fff" opacity="0.8"/>
    <circle cx="140" cy="140" r="1.8" fill="#ffe066" opacity="0.7"/>
    <circle cx="130" cy="130" r="2.1" fill="#fff" opacity="0.7"/>
    <circle cx="120" cy="120" r="2.5" fill="#1989fa" opacity="0.8"/>
    <circle cx="30" cy="30" r="2.5" fill="#ffe066" opacity="0.8"/>
    <circle cx="40" cy="40" r="2" fill="#fff" opacity="0.7"/>
    <circle cx="50" cy="50" r="1.7" fill="#1989fa" opacity="0.8"/>
    <circle cx="60" cy="60" r="2.2" fill="#fff" opacity="0.8"/>
    <circle cx="70" cy="70" r="2.5" fill="#ffe066" opacity="0.9"/>
    <!-- 汇聚到中心的星屑 -->
    <circle cx="90" cy="90" r="3.5" fill="#ffe066" opacity="1"/>
    <circle cx="92" cy="88" r="2.2" fill="#fff" opacity="0.8"/>
    <circle cx="88" cy="92" r="2.2" fill="#1989fa" opacity="0.8"/>
    <!-- 尘埃感星屑（外围、不同大小、不同透明度） -->
    <circle cx="20" cy="80" r="1.2" fill="#fff" opacity="0.3"/>
    <circle cx="160" cy="100" r="1.5" fill="#ffe066" opacity="0.3"/>
    <circle cx="100" cy="20" r="1.1" fill="#fff" opacity="0.2"/>
    <circle cx="80" cy="160" r="1.3" fill="#1989fa" opacity="0.2"/>
    <circle cx="120" cy="30" r="1.4" fill="#fff" opacity="0.25"/>
    <circle cx="40" cy="100" r="0.9" fill="#ffe066" opacity="0.18"/>
    <circle cx="100" cy="140" r="1.1" fill="#fff" opacity="0.18"/>
    <circle cx="150" cy="40" r="1.2" fill="#1989fa" opacity="0.18"/>
    <circle cx="60" cy="20" r="1.2" fill="#fff" opacity="0.13"/>
    <circle cx="20" cy="60" r="1.1" fill="#ffe066" opacity="0.13"/>
    <circle cx="160" cy="60" r="1.1" fill="#fff" opacity="0.13"/>
    <circle cx="120" cy="160" r="1.2" fill="#1989fa" opacity="0.13"/>
    <circle cx="30" cy="110" r="0.8" fill="#fff" opacity="0.09"/>
    <circle cx="110" cy="30" r="0.8" fill="#ffe066" opacity="0.09"/>
    <circle cx="150" cy="80" r="0.8" fill="#fff" opacity="0.09"/>
    <circle cx="80" cy="30" r="0.8" fill="#1989fa" opacity="0.09"/>
  </g>
  <!-- 中心强光 -->
  <circle cx="90" cy="90" r="12" fill="#fffbe7" opacity="0.85"/>
  <!-- 零星点缀 -->
  <circle cx="40" cy="60" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="150" cy="120" r="1.5" fill="#ffe066" opacity="0.6"/>
  <circle cx="120" cy="140" r="1" fill="#fff" opacity="0.4"/>
</svg> 